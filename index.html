<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbix - Welcome To The Future</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://futurasann.github.io/orbix/">
    <meta property="og:title" content="Orbix - Welcome To The Future">
    <meta property="og:description" content="Bergabunglah bersama Orbix menuju masa depan teknologi yang lebih cerah.">
    
    <meta property="og:image" content="https://futurasann.github.io/orbix/73219.png"> 
    <meta property="og:image:secure_url" content="https://futurasann.github.io/orbix/73219.png"> 
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="338">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Background menggunakan foto dari Catbox milikmu */
            background-image: url('https://files.catbox.moe/1r3u1b.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay transparan agar tombol Let's Join terlihat kontras */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* Konten Utama */
        .container {
            text-align: center;
            z-index: 2;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.5s ease-out;
        }

        /* Gambar teks judul Orbix Welcome */
        .brand-image {
            max-width: 800px;
            width: 100%;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0px 0px 50px rgba(255, 255, 255, 0.15));
        }

        /* Tombol Let's Join Ber-efek Glow */
        .btn-join {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0b0c10;
            background: linear-gradient(135deg, #ffffff, #cfd3dc);
            padding: 16px 45px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-join:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.4), 
                        0 0 50px rgba(255, 255, 255, 0.2);
            background: #ffffff;
        }

        .btn-join:active {
            transform: scale(0.98) translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            .brand-image { max-width: 85%; margin-bottom: 30px; }
            .btn-join { font-size: 1rem; padding: 12px 35px; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <img src="https://files.catbox.moe/d35ywa.png" alt="Orbix - Welcome To The Future" class="brand-image">
        
        <a href="join.html" class="btn-join">Let's join</a>
    </div>

</body>
</html>
